<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2EC;
    --surface: #FFFFFF;
    --border: #E0DBD0;
    --text: #1A1814;
    --text-muted: #8A857A;
    --accent: #2D5A27;
    --accent-light: #EAF3DE;
    --danger: #8B2020;
    --danger-light: #FCEBEB;
    --card-h: 220px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* — LAYOUT — */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    padding: 1.2rem 2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 1.5rem;
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--accent); font-style: italic; }

  main { flex: 1; padding: 2rem; max-width: 900px; margin: 0 auto; width: 100%; }

  /* — BUTTONS — */
  button { cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; transition: all 0.15s; }

  .btn {
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-weight: 500;
  }
  .btn:hover { background: var(--bg); }

  .btn-primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #234820; }

  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .btn-danger { color: var(--danger); border-color: #E8CCCC; }
  .btn-danger:hover { background: var(--danger-light); }
  .btn-ghost { border: none; background: none; color: var(--text-muted); padding: 6px 10px; }
  .btn-ghost:hover { color: var(--text); background: var(--bg); border-radius: 6px; }

  /* — DECKS SCREEN — */
  .screen { display: none; }
  .screen.active { display: block; }

  .screen-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .screen-title {
    font-family: 'Instrument Serif', serif;
    font-size: 1.8rem;
    letter-spacing: -0.02em;
  }

  .decks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1rem;
  }

  .deck-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .deck-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.07); }

  .deck-name {
    font-family: 'Instrument Serif', serif;
    font-size: 1.2rem;
    margin-bottom: 0.3rem;
  }

  .deck-count {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .deck-actions {
    position: absolute;
    top: 10px; right: 10px;
    display: flex; gap: 4px;
    opacity: 0; transition: opacity 0.15s;
  }
  .deck-card:hover .deck-actions { opacity: 1; }

  .deck-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin-bottom: 0.75rem;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
  }
  .empty-state p { margin-bottom: 1rem; font-size: 1rem; }

  /* — DECK DETAIL SCREEN — */
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--text-muted); font-size: 14px;
    background: none; border: none; cursor: pointer; margin-bottom: 1.5rem;
    padding: 0;
  }
  .back-btn:hover { color: var(--text); }

  .deck-toolbar {
    display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 2rem;
  }

  .cards-list { display: flex; flex-direction: column; gap: 0.6rem; }

  .card-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.9rem 1.1rem;
    display: flex; align-items: center; gap: 1rem;
  }

  .card-row-front {
    flex: 1; font-weight: 500;
  }

  .card-row-back {
    flex: 1; color: var(--text-muted); font-size: 14px;
  }

  .card-row-actions { display: flex; gap: 4px; flex-shrink: 0; }

  /* — STUDY SCREEN — */
  .study-wrap {
    display: flex; flex-direction: column; align-items: center;
    padding: 1rem 0;
    gap: 1.5rem;
  }

  .study-progress-bar {
    width: 100%; height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .study-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .study-meta {
    display: flex; justify-content: space-between;
    width: 100%; font-size: 13px;
    color: var(--text-muted); font-family: 'DM Mono', monospace;
  }

  .flashcard {
    width: 100%; max-width: 480px;
    height: var(--card-h);
    perspective: 1200px;
    cursor: pointer;
  }

  .flashcard-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }

  .flashcard-face {
    position: absolute; inset: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    backface-visibility: hidden;
    padding: 2rem;
    text-align: center;
  }

  .flashcard-back { transform: rotateY(180deg); background: var(--accent-light); border-color: #C8DFC0; }

  .face-label {
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 1rem;
  }

  .face-text {
    font-family: 'Instrument Serif', serif;
    font-size: 2rem;
    line-height: 1.25;
    color: var(--text);
  }

  .face-hint {
    margin-top: 1.2rem;
    font-size: 12px;
    color: var(--text-muted);
  }

  .study-actions { display: flex; gap: 1rem; }

  .btn-wrong {
    padding: 10px 28px; border-radius: 8px;
    border: 1px solid #E8CCCC; background: var(--surface);
    color: var(--danger); font-weight: 500; font-size: 15px;
  }
  .btn-wrong:hover { background: var(--danger-light); }

  .btn-right {
    padding: 10px 28px; border-radius: 8px;
    border: 1px solid #C8DFC0; background: var(--surface);
    color: var(--accent); font-weight: 500; font-size: 15px;
  }
  .btn-right:hover { background: var(--accent-light); }

  .score-display { display: flex; gap: 2rem; font-family: 'DM Mono', monospace; font-size: 13px; }
  .score-display span { color: var(--text-muted); }
  .score-display b { color: var(--text); }

  /* results */
  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    max-width: 400px;
    margin: 0 auto;
  }
  .results-big {
    font-family: 'Instrument Serif', serif;
    font-size: 3rem; color: var(--accent);
    margin: 0.5rem 0;
  }
  .results-label { color: var(--text-muted); font-size: 14px; margin-bottom: 1.5rem; }

  /* — MODAL — */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 1rem;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 1.75rem;
    width: 100%; max-width: 440px;
    transform: translateY(10px); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h3 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.3rem; margin-bottom: 1.25rem;
  }

  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: 7px;
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    background: var(--bg); color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 70px; }

  .modal-footer { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1.25rem; }

  /* emoji picker row */
  .emoji-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .emoji-opt {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    font-size: 18px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .emoji-opt.selected { border-color: var(--accent); background: var(--accent-light); }

  /* — CARD TRANSITION — */
  @keyframes cardOut {
    to { transform: translateX(-55px); opacity: 0; }
  }
  @keyframes cardIn {
    from { transform: translateX(55px); opacity: 0; }
  }
  .card-exit { animation: cardOut 0.18s ease forwards; }
  .card-enter { animation: cardIn 0.22s ease; }

  /* — RESPONSIVE — */
  @media (max-width: 600px) {
    header { padding: 1rem; }
    main { padding: 1rem; }
    .face-text { font-size: 1.6rem; }
    .study-actions { gap: 0.75rem; }
    .card-row { flex-wrap: wrap; }
    .card-row-back { width: 100%; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">flash<span>cards</span></div>
    <div id="header-actions"></div>
  </header>
  <main>
    <!-- DECKS SCREEN -->
    <div id="screen-decks" class="screen active">
      <div class="screen-header">
        <h1 class="screen-title">My Decks</h1>
        <button class="btn btn-primary" onclick="openNewDeckModal()">+ New Deck</button>
      </div>
      <div id="decks-grid" class="decks-grid"></div>
    </div>

    <!-- DECK DETAIL SCREEN -->
    <div id="screen-deck" class="screen">
      <button class="back-btn" onclick="showDecks()">← All decks</button>
      <div class="screen-header">
        <h1 class="screen-title" id="deck-title"></h1>
      </div>
      <div class="deck-toolbar">
        <button class="btn btn-primary" onclick="openNewCardModal()">+ Add Card</button>
        <button class="btn" onclick="startStudy()">▶ Study</button>
        <button class="btn btn-danger btn-sm" onclick="deleteDeck()">Delete Deck</button>
      </div>
      <div id="cards-list" class="cards-list"></div>
    </div>

    <!-- STUDY SCREEN -->
    <div id="screen-study" class="screen">
      <button class="back-btn" onclick="endStudy()">← Back to deck</button>
      <div class="study-wrap">
        <div style="width:100%;max-width:480px;">
          <div class="study-progress-bar"><div class="study-progress-fill" id="study-prog"></div></div>
        </div>
        <div class="study-meta" style="max-width:480px;">
          <span id="study-counter">1 / 1</span>
          <div class="score-display">
            <span>✓ <b id="s-correct">0</b></span>
            <span>✗ <b id="s-wrong">0</b></span>
          </div>
        </div>
        <div class="flashcard" id="flashcard" onclick="flipCard()">
          <div class="flashcard-inner">
            <div class="flashcard-face flashcard-front">
              <div class="face-label">front</div>
              <div class="face-text" id="card-front-text"></div>
              <div class="face-hint">tap to flip</div>
            </div>
            <div class="flashcard-face flashcard-back">
              <div class="face-label">back</div>
              <div class="face-text" id="card-back-text"></div>
            </div>
          </div>
        </div>
        <div class="study-actions" id="study-actions" style="visibility:hidden;">
          <button class="btn-wrong" onclick="markCard(false)">✗ Wrong</button>
          <button class="btn-right" onclick="markCard(true)">✓ Correct</button>
        </div>
      </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="screen-results" class="screen">
      <div class="study-wrap">
        <div class="results-card">
          <div style="font-size:2.5rem;">🎉</div>
          <div class="results-big" id="result-score"></div>
          <div class="results-label" id="result-label"></div>
          <div style="display:flex;gap:0.75rem;justify-content:center;">
            <button class="btn btn-primary" onclick="startStudy()">Study Again</button>
            <button class="btn" onclick="showDeck()">Back to Deck</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- NEW DECK MODAL -->
<div class="modal-overlay" id="modal-deck">
  <div class="modal">
    <h3>New Deck</h3>
    <div class="form-group">
      <label>Deck Name</label>
      <input type="text" id="deck-name-input" placeholder="e.g. German Vocabulary" />
    </div>
    <div class="form-group">
      <label>Icon</label>
      <div class="emoji-row" id="emoji-row"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-deck')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDeck()">Create Deck</button>
    </div>
  </div>
</div>

<!-- NEW CARD MODAL -->
<div class="modal-overlay" id="modal-card">
  <div class="modal">
    <h3 id="card-modal-title">Add Card</h3>
    <div class="form-group">
      <label>Front (question / word)</label>
      <textarea id="card-front-input" placeholder="e.g. liegen"></textarea>
    </div>
    <div class="form-group">
      <label>Back (answer / translation)</label>
      <textarea id="card-back-input" placeholder="e.g. to lie (down)"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-card')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCard()">Save Card</button>
    </div>
  </div>
</div>

<script>
const EMOJIS = ['📚','🌍','🧠','✏️','🤓','🗣️','📱','⭐','🎯','💡','💬','🎨'];
let selectedEmoji = EMOJIS[0];
let editingCardId = null;

// — STORAGE —
function load() { return JSON.parse(localStorage.getItem('fc_decks') || '[]'); }
function save(decks) { localStorage.setItem('fc_decks', JSON.stringify(decks)); }

// — STATE —
let currentDeckId = null;
let studyCards = [], studyIdx = 0, studyCorrect = 0, studyWrong = 0;

// — SCREENS —
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function showDecks() { show('decks'); renderDecks(); }

function showDeck() {
  show('deck');
  const deck = getDeck(currentDeckId);
  document.getElementById('deck-title').textContent = deck.name;
  renderCards();
}

function getDeck(id) { return load().find(d => d.id === id); }

// — RENDER DECKS —
function renderDecks() {
  const decks = load();
  const grid = document.getElementById('decks-grid');
  if (!decks.length) {
    grid.innerHTML = `<div class="empty-state"><p>No decks yet. Create your first one!</p></div>`;
    return;
  }
  grid.innerHTML = decks.map(d => `
    <div class="deck-card" onclick="openDeck('${d.id}')">
      <div class="deck-dot">${d.emoji || '📚'}</div>
      <div class="deck-name">${esc(d.name)}</div>
      <div class="deck-count">${d.cards.length} card${d.cards.length !== 1 ? 's' : ''}</div>
      <div class="deck-actions" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEditDeckModal('${d.id}')">✎</button>
      </div>
    </div>
  `).join('');
}

function openDeck(id) {
  currentDeckId = id;
  showDeck();
}

// — RENDER CARDS —
function renderCards() {
  const deck = getDeck(currentDeckId);
  const list = document.getElementById('cards-list');
  if (!deck.cards.length) {
    list.innerHTML = `<div class="empty-state"><p>No cards yet. Add your first card!</p></div>`;
    return;
  }
  list.innerHTML = deck.cards.map(c => `
    <div class="card-row">
      <div class="card-row-front">${esc(c.front)}</div>
      <div class="card-row-back">${esc(c.back)}</div>
      <div class="card-row-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEditCardModal('${c.id}')">✎</button>
        <button class="btn btn-ghost btn-sm btn-danger" onclick="deleteCard('${c.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

// — DECK MODAL —
function openNewDeckModal() {
  selectedEmoji = EMOJIS[0];
  document.getElementById('deck-name-input').value = '';
  renderEmojiRow();
  openModal('modal-deck');
  document.getElementById('modal-deck').dataset.editing = '';
}

function openEditDeckModal(id) {
  const deck = getDeck(id);
  selectedEmoji = deck.emoji || EMOJIS[0];
  document.getElementById('deck-name-input').value = deck.name;
  renderEmojiRow();
  document.getElementById('modal-deck').dataset.editing = id;
  openModal('modal-deck');
}

function renderEmojiRow() {
  document.getElementById('emoji-row').innerHTML = EMOJIS.map(e =>
    `<button class="emoji-opt ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</button>`
  ).join('');
}

function selectEmoji(e) {
  selectedEmoji = e;
  renderEmojiRow();
}

function saveDeck() {
  const name = document.getElementById('deck-name-input').value.trim();
  if (!name) return;
  const decks = load();
  const editId = document.getElementById('modal-deck').dataset.editing;
  if (editId) {
    const d = decks.find(d => d.id === editId);
    d.name = name; d.emoji = selectedEmoji;
  } else {
    decks.push({ id: uid(), name, emoji: selectedEmoji, cards: [] });
  }
  save(decks);
  closeModal('modal-deck');
  renderDecks();
}

function deleteDeck() {
  if (!confirm('Delete this deck and all its cards?')) return;
  const decks = load().filter(d => d.id !== currentDeckId);
  save(decks);
  showDecks();
}

// — CARD MODAL —
function openNewCardModal() {
  editingCardId = null;
  document.getElementById('card-modal-title').textContent = 'Add Card';
  document.getElementById('card-front-input').value = '';
  document.getElementById('card-back-input').value = '';
  openModal('modal-card');
}

function openEditCardModal(id) {
  const deck = getDeck(currentDeckId);
  const card = deck.cards.find(c => c.id === id);
  editingCardId = id;
  document.getElementById('card-modal-title').textContent = 'Edit Card';
  document.getElementById('card-front-input').value = card.front;
  document.getElementById('card-back-input').value = card.back;
  openModal('modal-card');
}

function saveCard() {
  const front = document.getElementById('card-front-input').value.trim();
  const back = document.getElementById('card-back-input').value.trim();
  if (!front || !back) return;
  const decks = load();
  const deck = decks.find(d => d.id === currentDeckId);
  if (editingCardId) {
    const card = deck.cards.find(c => c.id === editingCardId);
    card.front = front; card.back = back;
  } else {
    deck.cards.push({ id: uid(), front, back });
  }
  save(decks);
  closeModal('modal-card');
  renderCards();
  updateDeckTitle();
}

function deleteCard(id) {
  const decks = load();
  const deck = decks.find(d => d.id === currentDeckId);
  deck.cards = deck.cards.filter(c => c.id !== id);
  save(decks);
  renderCards();
  updateDeckTitle();
}

function updateDeckTitle() {
  const deck = getDeck(currentDeckId);
  document.getElementById('deck-title').textContent = deck.name;
}

// — STUDY —
function startStudy() {
  const deck = getDeck(currentDeckId);
  if (!deck.cards.length) { alert('Add some cards first!'); return; }
  studyCards = [...deck.cards].sort(() => Math.random() - 0.5);
  studyIdx = 0; studyCorrect = 0; studyWrong = 0;
  show('study');
  renderStudyCard();
}

function renderStudyCard() {
  const card = studyCards[studyIdx];
  const fc = document.getElementById('flashcard');
  const inner = fc.querySelector('.flashcard-inner');
  inner.style.transition = 'none';
  fc.classList.remove('flipped');
  fc.offsetHeight; // force reflow
  inner.style.transition = '';
  document.getElementById('card-front-text').textContent = card.front;
  document.getElementById('card-back-text').textContent = card.back;
  document.getElementById('study-counter').textContent = `${studyIdx + 1} / ${studyCards.length}`;
  document.getElementById('study-prog').style.width = (studyIdx / studyCards.length * 100) + '%';
  document.getElementById('s-correct').textContent = studyCorrect;
  document.getElementById('s-wrong').textContent = studyWrong;
  document.getElementById('study-actions').style.visibility = 'hidden';
  fc.classList.remove('card-exit');
  fc.classList.add('card-enter');
  fc.addEventListener('animationend', () => fc.classList.remove('card-enter'), { once: true });
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
  document.getElementById('study-actions').style.visibility = 'visible';
}

function markCard(correct) {
  if (correct) studyCorrect++; else studyWrong++;
  studyIdx++;
  const fc = document.getElementById('flashcard');
  fc.classList.add('card-exit');
  setTimeout(() => {
    if (studyIdx >= studyCards.length) {
      showResults();
    } else {
      renderStudyCard();
    }
  }, 180);
}

function showResults() {
  show('results');
  const total = studyCards.length;
  const pct = Math.round(studyCorrect / total * 100);
  document.getElementById('result-score').textContent = `${studyCorrect} / ${total}`;
  document.getElementById('result-label').textContent = `${pct}% correct · ${studyWrong} to review`;
}

function endStudy() { showDeck(); }

// — MODAL HELPERS —
function openModal(id) {
  document.getElementById(id).classList.add('open');
  setTimeout(() => {
    const inp = document.querySelector(`#${id} input, #${id} textarea`);
    if (inp) inp.focus();
  }, 100);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  if (document.getElementById('screen-study').classList.contains('active')) {
    if (e.key === ' ') { e.preventDefault(); flipCard(); }
    if (e.key === 'ArrowRight') markCard(true);
    if (e.key === 'ArrowLeft') markCard(false);
  }
});

// — UTILS —
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
